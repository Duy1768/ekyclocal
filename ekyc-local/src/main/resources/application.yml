server:
  port: 8080

spring:

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://localhost:5432/ekyc
    username: baoduy
    password:

    hikari:
      pool-name: EKYC_POOL

      minimum-idle: 5

      maximum-pool-size: 20

      idle-timeout: 600000

      max-lifetime: 1800000

      connection-timeout: 30000

logging:

  level:
    root: INFO

  file:
    name: logs/ekyc.log

  pattern:

    console: "[%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX,Asia/Ho_Chi_Minh}] %-5level [%X{requestId:-N/A}] [%class{0}.%M] %msg%n"

    file: "[%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX,Asia/Ho_Chi_Minh}] %-5level [%X{requestId:-N/A}] [%class{0}.%M] %msg%n"

signature:
  secret-key: ekyc-secret-key